<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rashid Ahmed Abbasi | Software Engineer</title>
        <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
        <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
        <link rel="android-chrome-192x192" sizes="192x192" href="favicon/android-chrome-192x192.png">
        <link rel="android-chrome-512x512" sizes="512x512" href="favicon/android-chrome-512x512.png">
        <link rel="manifest" href="site.webmanifest">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" defer>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" defer>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v10/font/simple-icons.min.css" defer>
        
        <link href="style.css" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous" defer></script>        
        <script src="js/main.js"></script>
    </head>

    <body>
        <header class="py-5 bg-primary text-white">
            <div class="container">
                <h1 class="display-5 fw-semibold">My Projects</h1>
                <p class="lead text-white-75">Explore my portfolio of software engineering projects</p>
            </div>
        </header>

        <main>
            <section class="py-5">
                <div class="container">
                    <div class="row mb-4 g-2">
                        <div class="col-9">
                            <input type="text" id="projectSearch" class="form-control" placeholder="Search projects by title, description, or tags...">
                        </div>
                        <div class="col-3">
                            <!-- Searchable Dropdown Button -->
                            <div class="dropdown w-100">
                                <button class="btn btn-outline-primary dropdown-toggle w-100 d-flex justify-content-between align-items-center" type="button" id="filterDropdownBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
                                    Filters
                                </button>
                                <div class="dropdown-menu p-3 w-100" aria-labelledby="filterDropdownBtn">
                                    <!-- Inner Search Input for Tags -->
                                    <input type="text" id="tagSearchInput" class="form-control form-control-sm mb-2" placeholder="Search technologies...">
                                    <!-- Scrollable Container for Dynamic Checkboxes -->
                                    <div id="projectFilters" class="overflow-auto" style="max-height: 200px;">
                                        <!-- Filter items will be loaded dynamically here -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="projectsContainer" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                        <!-- Projects will be loaded dynamically -->
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
